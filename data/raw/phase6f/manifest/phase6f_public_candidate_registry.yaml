# Phase 6F public M33 data candidate registry
# Human-readable audit: docs/phase6f_public_data_acquisition_audit.md
# Machine output: scripts/audit_phase6f_public_data_sources.py
#
# Tier A = exact Corbelli 2014 primary products (author/archive request likely)
# Tier B = public-data pilot substitutes (NOT Corbelli replication)
# Tier C = reference/proxy smoke tests only

